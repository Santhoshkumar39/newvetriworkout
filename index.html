<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>PPLUL Workout · Strength & Hypertrophy</title>
  <!-- Tailwind CSS + Lucide + Inter Font -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            push: { 50: '#fef2f2', 100: '#fee2e2', 200: '#fecaca', 400: '#f87171', 500: '#ef4444', 600: '#dc2626' },
            pull: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a' },
            legs: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb' },
            upper: { 50: '#fdf4ff', 100: '#fae8ff', 200: '#f5d0fe', 400: '#e879f9', 500: '#d946ef', 600: '#c026d3' },
            lower: { 50: '#fff7ed', 100: '#ffedd5', 200: '#fed7aa', 400: '#fb923c', 500: '#f97316', 600: '#ea580c' }
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0f; }
    .tab-active { position: relative; }
    .tab-active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 3px;
      border-radius: 999px;
    }
    .tab-push::after { background: #ef4444; }
    .tab-pull::after { background: #22c55e; }
    .tab-legs::after { background: #3b82f6; }
    .tab-upper::after { background: #d946ef; }
    .tab-lower::after { background: #f97316; }
    .workout-card { transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
    .workout-card:hover { transform: translateY(-3px); box-shadow: 0 20px 25px -12px rgba(0,0,0,0.5); }
    .overload-input:focus { outline: none; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #1f1f2e; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    .fade-in { animation: fadeIn 0.35s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .set-row:hover { background: rgba(255,255,255,0.04); }
    input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { opacity: 1; }
    .check-box { transition: all 0.15s ease; }
    .exercise-img {
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-950 to-black text-white min-h-screen">

  <!-- Header with offline badge -->
  <header class="sticky top-0 z-50 bg-gray-950/90 backdrop-blur-xl border-b border-gray-800/60">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-red-500 via-green-500 to-blue-500 rounded-xl flex items-center justify-center shadow-lg">
          <i data-lucide="dumbbell" class="w-5 h-5 text-white"></i>
        </div>
        <div>
          <h1 class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-white to-gray-300 bg-clip-text text-transparent">PPLUL Workout</h1>
          <p class="text-[11px] text-gray-400 font-medium tracking-wide">Push · Pull · Legs · Rest · Upper · Lower · KG</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <div class="hidden sm:flex items-center gap-1.5 bg-gray-800/60 rounded-lg px-3 py-1.5 text-xs text-emerald-400 border border-emerald-500/30">
          <i data-lucide="wifi-off" class="w-3 h-3"></i>
          <span class="font-mono">Offline Ready</span>
        </div>
        <button onclick="resetAll()" class="px-3 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-gray-400 hover:text-white text-sm font-medium transition flex items-center gap-1.5">
          <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i>
          <span class="hidden sm:inline">Reset</span>
        </button>
        <button onclick="saveProgress()" class="px-3 py-2 rounded-lg bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white text-sm font-semibold transition flex items-center gap-1.5 shadow-md">
          <i data-lucide="save" class="w-3.5 h-3.5"></i>
          <span class="hidden sm:inline">Save</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Day Tabs: 5 splits (PUSH, PULL, LEGS, UPPER, LOWER) + REST label -->
  <div class="max-w-7xl mx-auto px-4 pt-6">
    <div class="flex flex-wrap gap-2 bg-gray-900/80 rounded-2xl p-1.5 backdrop-blur-sm">
      <button onclick="switchTab('push')" id="tab-push" class="tab-btn flex-1 py-2.5 px-3 rounded-xl text-xs sm:text-sm font-bold transition-all duration-300 flex items-center justify-center gap-1.5 bg-push-500/10 text-push-400 border border-push-500/30">
        <i data-lucide="arrow-up-right" class="w-4 h-4"></i>
        <span>PUSH</span>
      </button>
      <button onclick="switchTab('pull')" id="tab-pull" class="tab-btn flex-1 py-2.5 px-3 rounded-xl text-xs sm:text-sm font-bold transition-all duration-300 flex items-center justify-center gap-1.5 text-gray-500 hover:text-gray-300">
        <i data-lucide="arrow-down-left" class="w-4 h-4"></i>
        <span>PULL</span>
      </button>
      <button onclick="switchTab('legs')" id="tab-legs" class="tab-btn flex-1 py-2.5 px-3 rounded-xl text-xs sm:text-sm font-bold transition-all duration-300 flex items-center justify-center gap-1.5 text-gray-500 hover:text-gray-300">
        <i data-lucide="footprints" class="w-4 h-4"></i>
        <span>LEGS</span>
      </button>
      <button onclick="switchTab('upper')" id="tab-upper" class="tab-btn flex-1 py-2.5 px-3 rounded-xl text-xs sm:text-sm font-bold transition-all duration-300 flex items-center justify-center gap-1.5 text-gray-500 hover:text-gray-300">
        <i data-lucide="chevrons-up" class="w-4 h-4"></i>
        <span>UPPER</span>
      </button>
      <button onclick="switchTab('lower')" id="tab-lower" class="tab-btn flex-1 py-2.5 px-3 rounded-xl text-xs sm:text-sm font-bold transition-all duration-300 flex items-center justify-center gap-1.5 text-gray-500 hover:text-gray-300">
        <i data-lucide="chevrons-down" class="w-4 h-4"></i>
        <span>LOWER</span>
      </button>
    </div>
    <!-- Rest day hint -->
    <div class="mt-3 flex justify-center">
      <span class="text-xs text-gray-500 bg-gray-900/50 px-4 py-1.5 rounded-full border border-gray-800/50 flex items-center gap-2">
        <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
        Day 4: <span class="text-emerald-400 font-semibold">Rest</span> · Active recovery · mobility
      </span>
    </div>
  </div>

  <!-- Summary Stats Bar -->
  <div class="max-w-7xl mx-auto px-4 mt-5">
    <div id="summary-bar" class="grid grid-cols-3 gap-3">
      <!-- dynamic summary -->
    </div>
  </div>

  <!-- Workout Grid Container -->
  <div class="max-w-7xl mx-auto px-4 py-6">
    <div id="workout-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-5">
      <!-- JS renders -->
    </div>
  </div>

  <!-- Toast Notif -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 border border-gray-700 text-white px-5 py-3 rounded-xl shadow-2xl text-sm font-medium flex items-center gap-2 transition-all duration-300 translate-y-20 opacity-0 pointer-events-none z-50">
    <i data-lucide="check-circle" class="w-4 h-4 text-green-400"></i>
    <span id="toast-msg">Progress saved!</span>
  </div>

  <script>
    // ==================== PPLUL WORKOUT DATA (KG BASED) WITH IMAGES ====================
    // Updated with your specified split: Push, Pull, Legs, Upper, Lower (Rest Day 4 is implicit)
    const workoutData = {
      push: [
        { id: 'bench-press', name: 'Barbell Bench Press (heavy)', muscle: 'Chest', sets: 4, reps: 4, weight: 85, prevWeight: 85, notes: 'RPE 8–9', img: 'photo/Barbell-Bench-Press_Chest.jpg' },
        { id: 'overhead-press', name: 'Overhead Press (strict)', muscle: 'Shoulders', sets: 4, reps: 5, weight: 50, prevWeight: 50, notes: 'RPE 8', img: 'photo/dumbbell-seated-shoulder-press-1024x538.webp' },
        { id: 'incline-db-press', name: 'Incline Dumbbell Press', muscle: 'Upper Chest', sets: 3, reps: 7, weight: 32, prevWeight: 32, notes: 'controlled tempo', img: 'photo/0d7c2338d1f26334aa26905cc8c9043c.jpg' },
        { id: 'weighted-dips', name: 'Weighted Dips', muscle: 'Chest/Tris', sets: 3, reps: 7, weight: 25, prevWeight: 25, notes: '+20–40kg if possible', img: 'photo/weighted-tricep-dips.webp' },
        { id: 'lateral-raise', name: 'Lateral Raises (cable/DB)', muscle: 'Side Delts', sets: 4, reps: 12, weight: 12, prevWeight: 12, notes: 'drop set last set', img: 'photo/dumbbell-lateral-raise-768x403.webp' },
        { id: 'overhead-tricep', name: 'Overhead Triceps Extension', muscle: 'Triceps', sets: 3, reps: 9, weight: 20, prevWeight: 20, notes: 'stretch focus', img: 'photo/Triceps-Pushdown.jpg' },
        { id: 'tricep-pushdown', name: 'Triceps Pushdown (V-bar)', muscle: 'Triceps', sets: 3, reps: 11, weight: 30, prevWeight: 30, notes: 'high squeeze', img: 'photo/Triceps-Pushdown.jpg' }
      ],
      pull: [
        { id: 'deadlift', name: 'Deadlift (conventional)', muscle: 'Back', sets: 4, reps: 4, weight: 140, prevWeight: 140, notes: 'RPE 8–9', img: 'photo/OIP.webp' },
        { id: 'weighted-pullups', name: 'Weighted Pull-ups', muscle: 'Lats', sets: 4, reps: 5, weight: 15, prevWeight: 15, notes: '+10–30kg', img: 'photo/OIP (1).webp' },
        { id: 'pendlay-row', name: 'Pendlay Row', muscle: 'Back', sets: 3, reps: 6, weight: 70, prevWeight: 70, notes: 'explosive concentric', img: 'photo/OIP (1).webp' },
        { id: 'single-arm-row', name: 'Single-Arm Dumbbell Row', muscle: 'Back', sets: 3, reps: 9, weight: 40, prevWeight: 40, notes: 'per arm, max stretch', img: 'photo/dumbbell-romanian-deadlift-1024x538.webp' },
        { id: 'rack-chin', name: 'Rack Chin / flexed-arm hang', muscle: 'Biceps', sets: 3, reps: 7, weight: 0, prevWeight: 0, notes: 'partials for biceps', img: 'photo/bizeps-hammercurls.webp' },
        { id: 'face-pull', name: 'Face Pull (heavy)', muscle: 'Rear Delts', sets: 4, reps: 17, weight: 22, prevWeight: 22, notes: 'ext. rotation', img: 'photo/face-pull-1000x1000.jpg' },
        { id: 'hammer-curl', name: 'Hammer Curl (slow negative)', muscle: 'Biceps', sets: 3, reps: 9, weight: 18, prevWeight: 18, notes: '', img: 'photo/bizeps-hammercurls.webp' }
      ],
      legs: [
        { id: 'barbell-squat', name: 'Barbell Back Squat', muscle: 'Quads', sets: 4, reps: 4, weight: 120, prevWeight: 120, notes: 'RPE 8–9', img: 'photo/barbell-full-squat.webp' },
        { id: 'romanian-deadlift', name: 'Romanian Deadlift', muscle: 'Hamstrings', sets: 4, reps: 7, weight: 90, prevWeight: 90, notes: 'slow eccentric', img: 'photo/dumbbell-romanian-deadlift-1024x538.webp' },
        { id: 'front-squat', name: 'Front Squat (or Hack)', muscle: 'Quads', sets: 3, reps: 7, weight: 80, prevWeight: 80, notes: 'depth focus', img: 'photo/OIP (4).webp' },
        { id: 'leg-press', name: 'Leg Press (single-leg opt)', muscle: 'Quads', sets: 3, reps: 11, weight: 170, prevWeight: 170, notes: 'high volume', img: 'photo/OIP (3).webp' },
        { id: 'leg-curl', name: 'Lying Leg Curl (partials)', muscle: 'Hamstrings', sets: 3, reps: 13, weight: 45, prevWeight: 45, notes: '+3 partials last set', img: 'photo/seated-leg-curl-1-1000x1000.jpg' },
        { id: 'calf-raise', name: 'Standing Calf Raises', muscle: 'Calves', sets: 5, reps: 9, weight: 70, prevWeight: 70, notes: 'heavy + pause', img: 'photo/dumbbell-standing-calf-raise.webp' },
        { id: 'hanging-leg-raise', name: 'Hanging Leg Raises (weighted)', muscle: 'Core', sets: 3, reps: 11, weight: 5, prevWeight: 5, notes: 'core', img: 'photo/2edbed_108aa99a3d2548e9a5f560f80da5fcaa~mv2.avif' }
      ],
      upper: [
        { id: 'incline-bb-press', name: 'Incline Barbell Press', muscle: 'Chest', sets: 4, reps: 9, weight: 70, prevWeight: 70, notes: 'chest focus', img: 'photo/Barbell-Bench-Press_Chest.jpg' },
        { id: 'close-grip-pulldown', name: 'Close-Grip Pulldown (V-bar)', muscle: 'Lats', sets: 4, reps: 9, weight: 65, prevWeight: 65, notes: 'lat focus', img: 'photo/OIP.webp' },
        { id: 'seated-db-ohp', name: 'Seated Dumbbell Shoulder Press', muscle: 'Shoulders', sets: 3, reps: 9, weight: 30, prevWeight: 30, notes: 'neutral grip', img: 'photo/dumbbell-seated-shoulder-press-1024x538.webp' },
        { id: 'chest-supported-row', name: 'Chest-Supported Row', muscle: 'Back', sets: 3, reps: 11, weight: 50, prevWeight: 50, notes: 'squeeze 2 sec', img: 'photo/chest_supported_row_muscles_worked_600x600.webp' },
        { id: 'cable-fly', name: 'Cable Flyes (low to high)', muscle: 'Chest', sets: 3, reps: 13, weight: 15, prevWeight: 15, notes: 'upper chest', img: 'photo/Cable-Crossover-1-600x390.jpg' },
        { id: 'lateral-raise-machine', name: 'Lateral Raise machine', muscle: 'Side Delts', sets: 4, reps: 17, weight: 25, prevWeight: 25, notes: 'high reps burn', img: 'photo/dumbbell-lateral-raise-768x403.webp' },
        { id: 'tricep-overhead', name: 'Triceps Overhead Cable Ext.', muscle: 'Triceps', sets: 3, reps: 11, weight: 22, prevWeight: 22, notes: 'full ROM', img: 'photo/Triceps-Pushdown.jpg' },
        { id: 'bayesian-curl', name: 'Bayesian Cable Curl', muscle: 'Biceps', sets: 3, reps: 11, weight: 18, prevWeight: 18, notes: 'constant tension', img: 'photo/bizeps-hammercurls.webp' }
      ],
      lower: [
        { id: 'trap-bar-deadlift', name: 'Trap Bar Deadlift (or Deficit)', muscle: 'Posterior Chain', sets: 4, reps: 6, weight: 135, prevWeight: 135, notes: 'explosive', img: 'photo/OIP.webp' },
        { id: 'bulgarian-split', name: 'Bulgarian Split Squat', muscle: 'Quads/Glutes', sets: 4, reps: 9, weight: 30, prevWeight: 30, notes: 'per leg, no support', img: 'photo/dumbbell-split-squat-1.webp' },
        { id: 'seated-ham-curl', name: 'Seated Hamstring Curl (heavy)', muscle: 'Hamstrings', sets: 3, reps: 7, weight: 60, prevWeight: 60, notes: '2 sec hold at peak', img: 'photo/seated-leg-curl-1-1000x1000.jpg' },
        { id: 'walking-lunges', name: 'Walking Lunges (barbell/DB)', muscle: 'Quads/Glutes', sets: 3, reps: 13, weight: 25, prevWeight: 25, notes: 'per leg', img: 'photo/dumbbell-split-squat-1.webp' },
        { id: 'leg-extension', name: 'Leg Extensions (triple drop)', muscle: 'Quads', sets: 3, reps: 12, weight: 40, prevWeight: 40, notes: 'last set only', img: 'photo/Muscles-Leg-Extension.001.jpeg' },
        { id: 'seated-calf', name: 'Seated Calf Raises', muscle: 'Calves', sets: 5, reps: 13, weight: 55, prevWeight: 55, notes: 'stretch focus', img: 'photo/dumbbell-standing-calf-raise.webp' },
        { id: 'reverse-hyper', name: 'Reverse Hyper (or Back Ext)', muscle: 'Lower Back', sets: 3, reps: 13, weight: 20, prevWeight: 20, notes: 'lower back health', img: 'photo/2edbed_108aa99a3d2548e9a5f560f80da5fcaa~mv2.avif' }
      ]
    };

    let activeTab = 'push';

    // ========== LOCALSTORAGE (OFFLINE FIRST) ==========
    function loadProgress() {
      const saved = localStorage.getItem('pplul-progress-kg');
      if (saved) {
        const parsed = JSON.parse(saved);
        for (const day of Object.keys(workoutData)) {
          for (const exercise of workoutData[day]) {
            const key = `${day}-${exercise.id}`;
            if (parsed[key]) {
              exercise.sets = parsed[key].sets;
              exercise.reps = parsed[key].reps;
              exercise.weight = parsed[key].weight;
              exercise.prevWeight = parsed[key].prevWeight;
              exercise.notes = parsed[key].notes || exercise.notes;
            }
          }
        }
      }
    }

    function saveProgress() {
      const data = {};
      for (const day of Object.keys(workoutData)) {
        for (const ex of workoutData[day]) {
          const key = `${day}-${ex.id}`;
          data[key] = {
            sets: ex.sets,
            reps: ex.reps,
            weight: ex.weight,
            prevWeight: ex.prevWeight,
            notes: ex.notes
          };
        }
      }
      localStorage.setItem('pplul-progress-kg', JSON.stringify(data));
      showToast('Progress saved! (KG) ✅');
    }

    function resetAll() {
      if (confirm('⚠️ Reset all progress? This cannot be undone.')) {
        localStorage.removeItem('pplul-progress-kg');
        location.reload();
      }
    }

    function findExerciseById(id) {
      for (const day of Object.keys(workoutData)) {
        const found = workoutData[day].find(e => e.id === id);
        if (found) return found;
      }
      return null;
    }

    const colorMap = {
      push: { accent: 'red', text: 'text-red-400', bg: 'bg-red-500/10', border: 'border-red-500/30', fill: 'bg-red-500', ring: 'ring-red-500/30' },
      pull: { accent: 'green', text: 'text-green-400', bg: 'bg-green-500/10', border: 'border-green-500/30', fill: 'bg-green-500', ring: 'ring-green-500/30' },
      legs: { accent: 'blue', text: 'text-blue-400', bg: 'bg-blue-500/10', border: 'border-blue-500/30', fill: 'bg-blue-500', ring: 'ring-blue-500/30' },
      upper: { accent: 'purple', text: 'text-purple-400', bg: 'bg-purple-500/10', border: 'border-purple-500/30', fill: 'bg-purple-500', ring: 'ring-purple-500/30' },
      lower: { accent: 'orange', text: 'text-orange-400', bg: 'bg-orange-500/10', border: 'border-orange-500/30', fill: 'bg-orange-500', ring: 'ring-orange-500/30' }
    };

    function switchTab(tab) {
      activeTab = tab;
      const tabs = ['push', 'pull', 'legs', 'upper', 'lower'];
      tabs.forEach(t => {
        const btn = document.getElementById(`tab-${t}`);
        if (!btn) return;
        if (t === tab) {
          const c = colorMap[t];
          btn.className = `tab-btn flex-1 py-2.5 px-3 rounded-xl text-xs sm:text-sm font-bold transition-all duration-300 flex items-center justify-center gap-1.5 ${c.bg} ${c.text} border ${c.border}`;
        } else {
          btn.className = `tab-btn flex-1 py-2.5 px-3 rounded-xl text-xs sm:text-sm font-bold transition-all duration-300 flex items-center justify-center gap-1.5 text-gray-500 hover:text-gray-300`;
        }
      });
      renderWorkouts();
      renderSummary();
    }

    function renderSummary() {
      const exercises = workoutData[activeTab];
      const c = colorMap[activeTab];
      const totalSets = exercises.reduce((a, e) => a + e.sets, 0);
      const totalVolume = exercises.reduce((a, e) => a + (e.sets * e.reps * e.weight), 0);
      const avgReps = Math.round(exercises.reduce((a, e) => a + e.reps, 0) / exercises.length);
      document.getElementById('summary-bar').innerHTML = `
        <div class="bg-gray-900/90 rounded-xl p-4 border border-gray-800/60 flex items-center gap-3 backdrop-blur-sm">
          <div class="w-10 h-10 rounded-lg ${c.bg} ${c.text} flex items-center justify-center"><i data-lucide="layers" class="w-5 h-5"></i></div>
          <div><p class="text-[11px] text-gray-500 font-bold uppercase tracking-wider">Total Sets</p><p class="text-xl font-extrabold ${c.text}">${totalSets}</p></div>
        </div>
        <div class="bg-gray-900/90 rounded-xl p-4 border border-gray-800/60 flex items-center gap-3 backdrop-blur-sm">
          <div class="w-10 h-10 rounded-lg ${c.bg} ${c.text} flex items-center justify-center"><i data-lucide="trending-up" class="w-5 h-5"></i></div>
          <div><p class="text-[11px] text-gray-500 font-bold uppercase tracking-wider">Total Volume (kg)</p><p class="text-xl font-extrabold ${c.text}">${totalVolume >= 1000 ? (totalVolume/1000).toFixed(1) + 'k' : totalVolume}<span class="text-xs text-gray-500 ml-0.5">kg</span></p></div>
        </div>
        <div class="bg-gray-900/90 rounded-xl p-4 border border-gray-800/60 flex items-center gap-3 backdrop-blur-sm">
          <div class="w-10 h-10 rounded-lg ${c.bg} ${c.text} flex items-center justify-center"><i data-lucide="repeat" class="w-5 h-5"></i></div>
          <div><p class="text-[11px] text-gray-500 font-bold uppercase tracking-wider">Avg Reps</p><p class="text-xl font-extrabold ${c.text}">${avgReps}</p></div>
        </div>
      `;
      lucide.createIcons();
    }

    function getWeightChange(prev, current) {
      const diff = current - prev;
      if (diff > 0) return { icon: 'trending-up', color: 'text-green-400', label: `+${diff} kg` };
      if (diff < 0) return { icon: 'trending-down', color: 'text-red-400', label: `${diff} kg` };
      return { icon: 'minus', color: 'text-gray-500', label: 'Same' };
    }

    function generateSetRows(exercise) {
      let rows = '';
      const maxSets = Math.min(exercise.sets, 12);
      for (let i = 0; i < maxSets; i++) {
        rows += `
          <div class="set-row flex items-center gap-3 py-1.5 px-2 rounded-lg cursor-pointer transition" onclick="toggleCheck(this)">
            <div class="check-box w-5 h-5 rounded border-2 border-gray-600 flex items-center justify-center transition-all duration-200"></div>
            <span class="text-xs font-bold text-gray-500 w-8">Set ${i+1}</span>
            <span class="text-xs font-semibold text-gray-300 flex-1">${exercise.reps} reps</span>
            <span class="text-xs font-bold text-gray-400">${exercise.weight > 0 ? exercise.weight + ' kg' : 'BW'}</span>
          </div>
        `;
      }
      return rows;
    }

    window.toggleCheck = function(el) {
      const box = el.querySelector('.check-box');
      const isChecked = el.classList.toggle('completed');
      if (isChecked) {
        el.classList.add('bg-emerald-500/10');
        box.classList.add('bg-emerald-500', 'border-emerald-500');
        box.innerHTML = '<svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>';
        el.querySelectorAll('span').forEach(s => s.classList.add('line-through', 'opacity-50'));
      } else {
        el.classList.remove('bg-emerald-500/10');
        box.classList.remove('bg-emerald-500', 'border-emerald-500');
        box.innerHTML = '';
        el.querySelectorAll('span').forEach(s => s.classList.remove('line-through', 'opacity-50'));
      }
    };

    function escapeHtml(str) { 
      if(!str) return ''; 
      return str.replace(/[&<>]/g, function(m){ 
        if(m === '&') return '&amp;'; 
        if(m === '<') return '&lt;'; 
        if(m === '>') return '&gt;'; 
        return m;
      }); 
    }

    function renderWorkouts() {
      const exercises = workoutData[activeTab];
      const c = colorMap[activeTab];
      const container = document.getElementById('workout-container');
      container.innerHTML = exercises.map((ex, idx) => {
        const change = getWeightChange(ex.prevWeight, ex.weight);
        const volume = ex.sets * ex.reps * ex.weight;
        const imgSrc = ex.img || 'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=600&h=400&fit=crop&crop=center';
        return `
          <div class="workout-card bg-gray-900 rounded-2xl overflow-hidden border border-gray-800/60 fade-in" style="animation-delay: ${idx * 40}ms">
            <div class="relative h-44 overflow-hidden">
              <img src="${imgSrc}" alt="${ex.name}" class="w-full h-full object-cover brightness-75" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=600&h=400&fit=crop&crop=center'">
              <div class="absolute inset-0 bg-gradient-to-t from-gray-900 via-gray-900/40 to-transparent"></div>
              <div class="absolute top-3 left-3"><span class="px-2.5 py-1 rounded-lg bg-black/60 backdrop-blur-md text-[11px] font-bold uppercase tracking-wider ${c.text}">${ex.muscle}</span></div>
              <div class="absolute top-3 right-3"><span class="px-2.5 py-1 rounded-lg bg-black/60 backdrop-blur-md text-[11px] font-semibold text-gray-200">${volume >= 1000 ? (volume/1000).toFixed(1)+'k' : volume} kg</span></div>
              <div class="absolute bottom-3 left-3 right-3"><h3 class="text-lg font-extrabold text-white drop-shadow-lg">${ex.name}</h3></div>
            </div>
            <div class="px-4 pt-3 pb-2">
              <div class="flex items-center gap-3 mb-3">
                <div class="flex-1"><label class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Sets</label><div class="flex items-center mt-1 bg-gray-800 rounded-lg overflow-hidden"><button onclick="adjustValue('${ex.id}', 'sets', -1)" class="px-3 py-2 text-gray-400 hover:bg-gray-700"><i data-lucide="minus" class="w-3.5 h-3.5"></i></button><input type="number" value="${ex.sets}" min="1" max="99" onchange="updateValue('${ex.id}', 'sets', this.value)" class="w-10 text-center bg-transparent text-white font-bold text-sm overload-input"><button onclick="adjustValue('${ex.id}', 'sets', 1)" class="px-3 py-2 text-gray-400 hover:bg-gray-700"><i data-lucide="plus" class="w-3.5 h-3.5"></i></button></div></div>
                <span class="text-gray-700 font-bold text-lg mt-4">×</span>
                <div class="flex-1"><label class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Reps</label><div class="flex items-center mt-1 bg-gray-800 rounded-lg overflow-hidden"><button onclick="adjustValue('${ex.id}', 'reps', -1)" class="px-3 py-2 text-gray-400 hover:bg-gray-700"><i data-lucide="minus" class="w-3.5 h-3.5"></i></button><input type="number" value="${ex.reps}" min="1" max="99" onchange="updateValue('${ex.id}', 'reps', this.value)" class="w-10 text-center bg-transparent text-white font-bold text-sm overload-input"><button onclick="adjustValue('${ex.id}', 'reps', 1)" class="px-3 py-2 text-gray-400 hover:bg-gray-700"><i data-lucide="plus" class="w-3.5 h-3.5"></i></button></div></div>
              </div>
              <div class="space-y-1 mb-2">${generateSetRows(ex)}</div>
            </div>
            <!-- Progressive Overload Box (KG) -->
            <div class="mx-4 mb-4 bg-gray-800/80 rounded-xl p-3 border ${c.border}">
              <div class="flex items-center justify-between mb-2"><div class="flex items-center gap-2"><i data-lucide="flame" class="w-4 h-4 ${c.text}"></i><span class="text-[11px] font-bold uppercase tracking-widest ${c.text}">Progressive Overload (kg)</span></div><div class="flex items-center gap-1 ${change.color}"><i data-lucide="${change.icon}" class="w-3.5 h-3.5"></i><span class="text-[11px] font-bold">${change.label}</span></div></div>
              <div class="flex items-center gap-2"><div class="flex-1"><label class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Previous (kg)</label><input type="number" value="${ex.prevWeight}" min="0" step="0.5" onchange="updateValue('${ex.id}', 'prevWeight', this.value)" class="w-full mt-1 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white font-bold text-sm overload-input focus:${c.ring} focus:ring-2"></div><i data-lucide="arrow-right" class="w-4 h-4 text-gray-600 mt-5"></i><div class="flex-1"><label class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Current (kg)</label><input type="number" value="${ex.weight}" min="0" step="0.5" onchange="updateValue('${ex.id}', 'weight', this.value)" class="w-full mt-1 bg-gray-900 border ${c.border} rounded-lg px-3 py-2 ${c.text} font-extrabold text-sm overload-input focus:${c.ring} focus:ring-2"></div></div>
              <div class="mt-2"><input type="text" value="${escapeHtml(ex.notes)}" placeholder="Add notes (e.g., RPE, form)" onchange="updateValue('${ex.id}', 'notes', this.value)" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-1.5 text-gray-400 text-xs overload-input focus:${c.ring} focus:ring-2 placeholder:text-gray-600"></div>
            </div>
          </div>
        `;
      }).join('');
      lucide.createIcons();
    }

    // ==================== VALUE UPDATES ====================
    window.updateValue = function(id, field, value) {
      const exercise = findExerciseById(id);
      if (exercise) {
        if (field === 'notes') {
          exercise[field] = value;
        } else {
          let num = parseFloat(value);
          if (isNaN(num)) num = 0;
          if (field === 'sets' || field === 'reps') num = Math.max(1, Math.floor(num));
          if (field === 'weight' || field === 'prevWeight') num = Math.max(0, num);
          exercise[field] = num;
        }
        renderWorkouts();
        renderSummary();
      }
    };

    window.adjustValue = function(id, field, delta) {
      const exercise = findExerciseById(id);
      if (exercise) {
        let newVal = exercise[field] + delta;
        if (field === 'sets' || field === 'reps') newVal = Math.max(1, newVal);
        if (field === 'weight' || field === 'prevWeight') newVal = Math.max(0, newVal);
        exercise[field] = newVal;
        renderWorkouts();
        renderSummary();
      }
    };

    // ==================== TOAST ====================
    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-msg').textContent = msg;
      toast.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');
      setTimeout(() => {
        toast.classList.add('translate-y-20', 'opacity-0', 'pointer-events-none');
      }, 2500);
    }

    // ==================== INIT ====================
    loadProgress();
    switchTab('push');
  </script>
</body>
</html>
